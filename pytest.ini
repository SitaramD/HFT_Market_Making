[pytest]
# SITARAM HFT — pytest configuration

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output
addopts =
    -v
    --tb=short
    --strict-markers
    --color=yes

# Markers
markers =
    unit: Pure unit tests (no external deps)
    integration: Tests requiring live Docker services
    slow: Tests that take > 5 seconds
    backtest: Full backtest validation (expensive)

# Hypothesis settings
hypothesis_profile = ci

# Warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
